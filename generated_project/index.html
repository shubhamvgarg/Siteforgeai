<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer type="module"></script>
</head>
<body>
    <header>
        <h1>BMI Calculator</h1>
    </header>
    <main>
        <form id="bmi-form">
            <div>
                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" name="weight" placeholder="Weight (kg)" required>
            </div>
            <div>
                <label for="height">Height (cm):</label>
                <input type="number" id="height" name="height" placeholder="Height (cm)" required>
            </div>
            <button type="submit" id="calculate-btn">Calculate</button>
        </form>
        <section id="result" class="hidden">
            <p id="bmi-value"></p>
            <p id="bmi-category"></p>
            <p id="error-msg" class="error hidden"></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 BMI Calculator</p>
    </footer>
</body>
</html>
